version: 2

build:
  os: "ubuntu-lts-latest"
  tools:
    python: "3.14"

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false
  
python:
  # Install our python package before building the docs
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .

  
      
formats:
  - pdf
  - epub